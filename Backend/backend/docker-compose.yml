version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botforge-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - botforge_net
    # Optional: wait-for-it pattern can be applied in CMD if node can't handle transient network errors well.
    # We rely on Sequelize retry logic + depend_on condition here.

  mysql:
    image: mysql:8.0
    container_name: botforge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - botforge_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: botforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - botforge_net

networks:
  botforge_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
